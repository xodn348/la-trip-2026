<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>LA & Las Vegas 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a21;
    --panel2: #1e242d;
    --text: #e8eaee;
    --muted: #8b94a3;
    --accent: #ffd166;
    --booked: #06d6a0;
    --line: #2a313c;
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif; background: var(--bg); color: var(--text); overscroll-behavior: none; }
  body { overflow: hidden; }
  #app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; height: 100dvh; }
  #sidebar { background: var(--panel); overflow-y: auto; border-right: 1px solid var(--line); }
  #header { padding: 14px 16px 0; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 5; }
  #header h1 { margin: 0; font-size: 17px; letter-spacing: -0.01em; line-height: 1.3; }
  #header .sub { margin-top: 4px; color: var(--muted); font-size: 11px; }
  #counts { color: var(--muted); font-size: 11px; margin-top: 4px; }

  .view-tabs { display: flex; margin-top: 12px; border-bottom: 1px solid var(--line); margin-left: -16px; margin-right: -16px; padding: 0 16px; gap: 4px; }
  .view-tab { padding: 9px 14px; cursor: pointer; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; user-select: none; }
  .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .filters { padding: 10px 16px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 8px; background: var(--panel); position: sticky; top: 116px; z-index: 4; }
  #search { width: 100%; padding: 8px 10px; background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  .chip-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip { background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 5px 10px; border-radius: 999px; font-size: 12px; cursor: pointer; user-select: none; white-space: nowrap; flex-shrink: 0; }
  .chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .chip:hover { border-color: #4a5263; }
  .chip-day { display: flex; flex-direction: column; align-items: center; padding: 6px 11px; min-width: 48px; }
  .chip-day .d { font-size: 10px; opacity: 0.7; }
  .chip-day .n { font-size: 14px; font-weight: 600; line-height: 1.1; }

  .place-list { padding: 0 0 80px 0; margin: 0; }
  details.cat-section { border-bottom: 1px solid var(--line); }
  details.cat-section[open] { background: linear-gradient(180deg, #181d25 0%, transparent 30px); }
  details.cat-section summary { padding: 12px 16px; cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
  details.cat-section summary::-webkit-details-marker { display: none; }
  details.cat-section summary::after { content: "▾"; margin-left: auto; color: var(--muted); transition: transform 0.15s; }
  details.cat-section:not([open]) summary::after { transform: rotate(-90deg); }
  .cat-emoji { font-size: 18px; }
  .cat-count { color: var(--muted); font-size: 12px; font-weight: 400; margin-left: 4px; }

  .place-item { padding: 9px 16px 9px 44px; border-top: 1px solid var(--line); cursor: pointer; transition: background 0.1s; list-style: none; }
  .place-item:hover { background: var(--panel2); }
  .place-item.active { background: #2a3140; }
  .place-name { font-size: 13.5px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .place-meta { color: var(--muted); font-size: 11px; margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap; }
  .place-notes { color: #b8c0cc; font-size: 11.5px; margin-top: 3px; line-height: 1.35; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--panel2); border: 1px solid var(--line); }
  .badge.booked { background: var(--booked); color: #000; border-color: var(--booked); font-weight: 600; }
  .badge.wishlist { background: #ef476f; color: white; border-color: #ef476f; }
  .stars { color: var(--accent); font-size: 11px; }

  /* Schedule view */
  .day-header { padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .day-header .date { font-size: 12px; color: var(--muted); }
  .day-header .label { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .day-header .totals { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .day-cover { width: 100%; aspect-ratio: 16/10; background: var(--panel2); overflow: hidden; position: relative; }
  .day-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .day-cover .badge { position: absolute; bottom: 8px; left: 10px; background: rgba(0,0,0,0.55); color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 11px; backdrop-filter: blur(4px); }

  .schedule-list { padding: 8px 0 80px; margin: 0; list-style: none; position: relative; }
  .schedule-list::before { content: ""; position: absolute; left: 64px; top: 16px; bottom: 80px; width: 2px; background: var(--line); }
  .stop-item { display: grid; grid-template-columns: 56px 1fr; gap: 12px; padding: 10px 16px; align-items: start; cursor: pointer; position: relative; }
  .stop-item:hover { background: var(--panel2); }
  .stop-item.active { background: #2a3140; }
  .stop-time { font-size: 13px; font-weight: 600; color: var(--accent); padding-top: 1px; }
  .stop-time .duration { display: block; font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 1px; }
  .stop-body { position: relative; padding-left: 16px; }
  .stop-body::before { content: ""; position: absolute; left: -8px; top: 5px; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; border: 2px solid var(--panel); z-index: 1; }
  .stop-place { font-size: 14px; font-weight: 500; }
  .stop-note { font-size: 12px; color: #b8c0cc; margin-top: 3px; line-height: 1.4; }
  .stop-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  #map { height: 100vh; height: 100dvh; }
  .leaflet-popup-content { font-size: 13px; line-height: 1.45; margin: 10px 12px; }
  .leaflet-popup-content strong { font-size: 14px; display: block; margin-bottom: 4px; }
  .leaflet-popup-content .pop-meta { color: #666; font-size: 11px; margin-top: 6px; }
  .leaflet-popup-content a { color: #118ab2; text-decoration: none; font-weight: 500; }

  .marker-pin {
    width: 28px; height: 28px; border-radius: 50% 50% 50% 0;
    background: var(--accent); transform: rotate(-45deg);
    border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .marker-pin span { transform: rotate(45deg); font-size: 13px; }
  .marker-pin.booked { box-shadow: 0 0 0 3px var(--booked), 0 2px 6px rgba(0,0,0,0.4); }
  .marker-numbered {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent); color: #000; border: 2px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }

  #toggle-list { display: none; position: fixed; bottom: calc(20px + var(--safe-bottom)); right: 16px; z-index: 1000; background: var(--accent); color: #000; border: none; padding: 12px 18px; border-radius: 999px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 14px rgba(0,0,0,0.4); cursor: pointer; }

  @media (max-width: 768px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    #sidebar {
      position: fixed; left: 0; right: 0; bottom: 0; top: auto;
      height: 75vh; height: 75dvh;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 1100;
      border-right: none; border-top: 1px solid var(--line);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
    }
    #sidebar.open { transform: translateY(0); }
    #header { border-radius: 16px 16px 0 0; padding-top: 8px; }
    #header::before { content: ""; display: block; width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 10px; }
    .filters { top: 102px; }
    #toggle-list { display: block; }
    #map { height: 100vh; height: 100dvh; width: 100%; }
  }
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;background:#0f1115;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;color:#e8eaee">
  <div style="font-size:24px;margin-bottom:8px">🔒</div>
  <div style="font-size:13px;color:#8b94a3;margin-bottom:16px">LA & Las Vegas 2026</div>
  <div style="display:flex;gap:6px;align-items:center">
    <input id="gate-pw" type="password" placeholder="비밀번호" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" style="padding:10px 14px;background:#1e242d;border:1px solid #2a313c;border-radius:8px;color:#e8eaee;font-size:14px;outline:none;width:200px;text-align:center"/>
    <button id="gate-btn" style="padding:10px 14px;background:#ffd166;color:#000;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">확인</button>
  </div>
  <div id="gate-err" style="color:#ef476f;font-size:12px;margin-top:8px;height:14px"></div>
</div>
<script>
window.addEventListener("DOMContentLoaded", () => {
  const HASH = "3ddea50f9e4ec666a7de471a0b967df0dcff7f04c595e9c67e2133faabd06dd5"; // SHA-256("la2026")
  const KEY = "latrip-unlock-v1";
  async function sha(s) {
    const buf = new TextEncoder().encode(s);
    const h = await crypto.subtle.digest("SHA-256", buf);
    return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  const gate = document.getElementById("gate");
  const pw = document.getElementById("gate-pw");
  const err = document.getElementById("gate-err");
  const appEl = document.getElementById("app");
  if (localStorage.getItem(KEY) === HASH) { gate.remove(); return; }
  if (appEl) appEl.style.filter = "blur(20px)";
  pw.focus();
  async function tryUnlock() {
    const v = pw.value.trim().toLowerCase();
    const h = await sha(v);
    if (h === HASH) {
      localStorage.setItem(KEY, HASH);
      gate.remove();
      if (appEl) appEl.style.filter = "";
    } else {
      err.textContent = "비밀번호 틀림";
      pw.value = "";
      setTimeout(() => err.textContent = "", 1500);
    }
  }
  pw.addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });
  pw.addEventListener("keyup", (e) => { if (e.key === "Enter") tryUnlock(); });
  document.getElementById("gate-btn").addEventListener("click", tryUnlock);
});
</script>
<div id="app">
  <aside id="sidebar">
    <div id="header">
      <h1>🌴 LA & Las Vegas 2026</h1>
      <div class="sub">2026.05.08 – 05.17 · 부부 위시리스트</div>
      <div id="counts"></div>
      <div class="view-tabs">
        <span class="view-tab active" data-view="places">📍 모든 장소</span>
        <span class="view-tab" data-view="schedule">📅 일정</span>
      </div>
    </div>
    <div id="places-pane">
      <div class="filters">
        <input id="search" placeholder="🔍 장소 검색…" autocomplete="off">
        <div class="chip-row" id="city-filter"></div>
        <div class="chip-row" id="src-filter"></div>
      </div>
      <ul class="place-list" id="place-list"></ul>
    </div>
    <div id="schedule-pane" style="display:none">
      <div class="filters">
        <div class="chip-row" id="day-filter"></div>
      </div>
      <div id="day-content"></div>
    </div>
  </aside>
  <div id="map"></div>
</div>
<button id="toggle-list">📋 목록 보기</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const CATEGORY_ICONS = {
  hotel:       { emoji: "🏨", color: "#06d6a0", name: "숙소" },
  rental_car:  { emoji: "🚗", color: "#118ab2", name: "렌터카" },
  restaurant:  { emoji: "🍽️", color: "#ef476f", name: "맛집" },
  cafe:        { emoji: "☕", color: "#a07a5d", name: "카페·베이커리" },
  beach:       { emoji: "🏖️", color: "#73c2fb", name: "해변" },
  park:        { emoji: "🌳", color: "#52b788", name: "공원" },
  museum:      { emoji: "🏛️", color: "#9d4edd", name: "박물관·미술관" },
  attraction:  { emoji: "📍", color: "#ffd166", name: "관광지" },
  viewpoint:   { emoji: "🌅", color: "#f4a261", name: "뷰포인트" },
  shopping:    { emoji: "🛍️", color: "#f8961e", name: "쇼핑" },
  theme_park:  { emoji: "🎢", color: "#ff70a6", name: "테마파크" },
  zoo:         { emoji: "🦁", color: "#e76f51", name: "동물원" },
  theater:     { emoji: "🎭", color: "#bc6c25", name: "극장" },
};
const CATEGORY_ORDER = ["hotel", "rental_car", "restaurant", "cafe", "beach", "park", "museum", "attraction", "viewpoint", "shopping", "theme_park", "zoo", "theater"];
const SOURCE_LABELS = { booked: "예약됨", wishlist: "위시리스트" };

let allPlaces = [];
let placeByName = {};
let itinerary = null;
let activeView = "places";
let activeFilters = { city: "all", src: "all", q: "" };
let activeDay = 1;
let map, cluster, markers = {}, dayLayer = null;

async function init() {
  const [trip, itin] = await Promise.all([
    fetch(`places.json?ts=${Date.now()}`).then(r => r.json()),
    fetch(`itinerary.json?ts=${Date.now()}`).then(r => r.json()),
  ]);
  allPlaces = trip.places;
  itinerary = itin;
  allPlaces.forEach(p => placeByName[p.name] = p);
  document.querySelector("#header h1").textContent = "🌴 " + trip.title;
  document.querySelector("#header .sub").textContent = `${trip.dates} · 부부 공동 위시리스트`;
  setupMap();
  setupTabs();
  setupFilters();
  setupDayFilter();
  setupMobileSheet();
  render();
}

function setupMap() {
  map = L.map("map", { zoomControl: true, tap: true }).setView([34.0522, -117.5], 7);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '© <a href="https://openstreetmap.org/copyright">OSM</a> · CARTO',
    subdomains: "abcd", maxZoom: 19
  }).addTo(map);
  cluster = L.markerClusterGroup({ disableClusteringAtZoom: 12, spiderfyOnMaxZoom: true, showCoverageOnHover: false });
  map.addLayer(cluster);
}

function setupTabs() {
  document.querySelectorAll(".view-tab").forEach(t => {
    t.addEventListener("click", () => {
      document.querySelectorAll(".view-tab").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      activeView = t.dataset.view;
      document.getElementById("places-pane").style.display = activeView === "places" ? "" : "none";
      document.getElementById("schedule-pane").style.display = activeView === "schedule" ? "" : "none";
      render();
    });
  });
}

function setupMobileSheet() {
  const sidebar = document.getElementById("sidebar");
  const btn = document.getElementById("toggle-list");
  btn.addEventListener("click", () => {
    sidebar.classList.toggle("open");
    btn.textContent = sidebar.classList.contains("open") ? "🗺️ 지도 보기" : "📋 목록 보기";
  });
  document.getElementById("sidebar").addEventListener("click", (e) => {
    if (window.innerWidth <= 768 && (e.target.closest(".place-item") || e.target.closest(".stop-item"))) {
      setTimeout(() => {
        sidebar.classList.remove("open");
        btn.textContent = "📋 목록 보기";
      }, 200);
    }
  });
}

function makeIcon(category, isBooked) {
  const c = CATEGORY_ICONS[category] || CATEGORY_ICONS.attraction;
  const color = isBooked ? "#06d6a0" : c.color;
  return L.divIcon({
    className: "",
    html: `<div class="marker-pin ${isBooked ? "booked" : ""}" style="background:${color}"><span>${c.emoji}</span></div>`,
    iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -24],
  });
}
function makeNumberedIcon(num, color) {
  return L.divIcon({
    className: "",
    html: `<div class="marker-numbered" style="background:${color}">${num}</div>`,
    iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -15],
  });
}

function setupFilters() {
  const cities = [...new Set(allPlaces.map(p => p.city))].sort();
  const srcs = [...new Set(allPlaces.map(p => p.source))].sort();
  buildChips("city-filter", ["all", ...cities], "city");
  buildChips("src-filter", ["all", ...srcs], "src");
  document.getElementById("search").addEventListener("input", e => {
    activeFilters.q = e.target.value.toLowerCase();
    if (activeView === "places") render();
  });
}

function buildChips(elId, values, key) {
  const el = document.getElementById(elId);
  el.innerHTML = "";
  values.forEach(v => {
    const c = document.createElement("span");
    c.className = "chip" + (activeFilters[key] === v ? " active" : "");
    c.textContent = v === "all" ? "전체" : (SOURCE_LABELS[v] || v);
    c.onclick = () => {
      activeFilters[key] = v;
      [...el.children].forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      render();
    };
    el.appendChild(c);
  });
}

function setupDayFilter() {
  const el = document.getElementById("day-filter");
  el.innerHTML = "";
  itinerary.days.forEach(d => {
    const c = document.createElement("span");
    c.className = "chip chip-day" + (d.day === activeDay ? " active" : "");
    const md = d.date.slice(5).replace("-", "/");
    c.innerHTML = `<span class="d">${d.weekday} ${md}</span><span class="n">D${d.day}</span>`;
    c.onclick = () => {
      activeDay = d.day;
      [...el.children].forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      render();
    };
    el.appendChild(c);
  });
}

function filterPlaces() {
  return allPlaces.filter(p => {
    if (activeFilters.city !== "all" && p.city !== activeFilters.city) return false;
    if (activeFilters.src !== "all" && p.source !== activeFilters.src) return false;
    if (activeFilters.q) {
      const hay = (p.name + " " + (p.notes||"") + " " + p.city + " " + p.category).toLowerCase();
      if (!hay.includes(activeFilters.q)) return false;
    }
    return true;
  });
}

function render() {
  cluster.clearLayers();
  if (dayLayer) { map.removeLayer(dayLayer); dayLayer = null; }
  markers = {};

  if (activeView === "places") {
    const places = filterPlaces();
    places.forEach(p => {
      if (p.lat == null) return;
      const m = L.marker([p.lat, p.lon], { icon: makeIcon(p.category, p.source === "booked") });
      m.bindPopup(makePopup(p), { maxWidth: 280 });
      cluster.addLayer(m);
      markers[`${p.lat},${p.lon}`] = m;
    });
    if (places.length > 0) {
      const valid = places.filter(p => p.lat);
      if (valid.length === 1) map.setView([valid[0].lat, valid[0].lon], 13);
      else map.fitBounds(L.latLngBounds(valid.map(p => [p.lat, p.lon])), { padding: [40, 40], maxZoom: 13 });
    }
    renderPlaceList(places);
    document.getElementById("counts").textContent = `${places.length} / ${allPlaces.length} places`;
  } else {
    const day = itinerary.days.find(d => d.day === activeDay);
    if (!day) return;
    const layers = [];
    const points = [];
    day.stops.forEach((s, i) => {
      const p = placeByName[s.place];
      if (!p || p.lat == null) return;
      const num = i + 1;
      const m = L.marker([p.lat, p.lon], { icon: makeNumberedIcon(num, day.color) });
      m.bindPopup(`<strong>${num}. ${s.place}</strong><div style="color:${day.color};font-weight:600">${s.time}</div>${s.note ? `<div style="margin-top:4px">${s.note}</div>` : ""}<div class="pop-meta">${s.duration||""}</div>`, { maxWidth: 280 });
      cluster.addLayer(m);
      layers.push(m);
      points.push([p.lat, p.lon]);
    });
    if (points.length > 1) {
      dayLayer = L.polyline(points, { color: day.color, weight: 3, opacity: 0.7, dashArray: "8 6" }).addTo(map);
      map.fitBounds(L.latLngBounds(points), { padding: [50, 50], maxZoom: 13 });
    } else if (points.length === 1) {
      map.setView(points[0], 13);
    }
    renderSchedule(day);
    document.getElementById("counts").textContent = `Day ${day.day} · ${day.stops.length} stops`;
  }
}

function makePopup(p) {
  const stars = p.rating ? `⭐ ${p.rating}` : "";
  const cat = CATEGORY_ICONS[p.category] || CATEGORY_ICONS.attraction;
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.query || p.name + " " + p.city)}`;
  return `
    <strong>${p.name}</strong>
    <div>${cat.emoji} ${cat.name} · ${p.city}</div>
    ${stars ? `<div class="stars">${stars}</div>` : ""}
    ${p.notes ? `<div style="margin-top:6px">${p.notes}</div>` : ""}
    <div class="pop-meta"><a href="${mapsUrl}" target="_blank" rel="noopener">🗺️ 구글맵에서 길찾기 →</a></div>
  `;
}

function renderPlaceList(places) {
  const ul = document.getElementById("place-list");
  ul.innerHTML = "";
  const grouped = {};
  places.forEach(p => { (grouped[p.category] = grouped[p.category] || []).push(p); });
  CATEGORY_ORDER.forEach(cat => {
    if (!grouped[cat]) return;
    const ci = CATEGORY_ICONS[cat] || CATEGORY_ICONS.attraction;
    const details = document.createElement("details");
    details.className = "cat-section";
    details.open = ["hotel", "rental_car"].includes(cat) || grouped[cat].length <= 3;
    const summary = document.createElement("summary");
    summary.innerHTML = `<span class="cat-emoji">${ci.emoji}</span> ${ci.name} <span class="cat-count">(${grouped[cat].length})</span>`;
    details.appendChild(summary);
    grouped[cat].sort((a, b) => (b.rating||0) - (a.rating||0)).forEach(p => {
      const li = document.createElement("li");
      li.className = "place-item";
      const stars = p.rating ? `<span class="stars">⭐ ${p.rating}</span>` : "";
      li.innerHTML = `
        <div class="place-name">${p.name} <span class="badge ${p.source}">${SOURCE_LABELS[p.source]||p.source}</span></div>
        <div class="place-meta"><span>${p.city}</span>${stars ? "·" : ""} ${stars}</div>
        ${p.notes ? `<div class="place-notes">${p.notes}</div>` : ""}
      `;
      li.onclick = () => {
        if (p.lat == null) return;
        map.setView([p.lat, p.lon], 15);
        const m = markers[`${p.lat},${p.lon}`];
        if (m) cluster.zoomToShowLayer(m, () => m.openPopup());
        [...ul.querySelectorAll(".place-item")].forEach(x => x.classList.remove("active"));
        li.classList.add("active");
      };
      details.appendChild(li);
    });
    ul.appendChild(details);
  });
}

function renderSchedule(day) {
  const root = document.getElementById("day-content");
  const cover = day.cover ? `
    <div class="day-cover">
      <img src="${day.cover}" alt="Day ${day.day}" loading="lazy"/>
      <div class="badge">Day ${day.day} · ${day.date}</div>
    </div>` : "";
  const dh = `
    ${cover}
    <div class="day-header" style="border-left: 4px solid ${day.color}">
      <div class="date">${day.date} (${day.weekday})</div>
      <div class="label">Day ${day.day} · ${day.label}</div>
      <div class="totals">${day.stops.length} stops · 첫: ${day.stops[0]?.time} / 마지막: ${day.stops.at(-1)?.time}</div>
    </div>
  `;
  const items = day.stops.map((s, i) => {
    const p = placeByName[s.place];
    const city = p ? `${p.city}` : "";
    return `
      <li class="stop-item" data-idx="${i}">
        <div class="stop-time">${s.time}<span class="duration">${s.duration||""}</span></div>
        <div class="stop-body" style="--dotc:${day.color}">
          <div class="stop-place">${i+1}. ${s.place}</div>
          ${s.note ? `<div class="stop-note">${s.note}</div>` : ""}
          ${city ? `<div class="stop-meta">${city}</div>` : ""}
        </div>
      </li>
    `;
  }).join("");
  root.innerHTML = dh + `<ul class="schedule-list">${items}</ul>`;
  // wire clicks
  root.querySelectorAll(".stop-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = +el.dataset.idx;
      const s = day.stops[idx];
      const p = placeByName[s.place];
      if (!p || p.lat == null) return;
      map.setView([p.lat, p.lon], 15);
      const m = Object.values(cluster.getLayers()).find(layer => {
        const ll = layer.getLatLng();
        return Math.abs(ll.lat - p.lat) < 1e-6 && Math.abs(ll.lng - p.lon) < 1e-6;
      });
      if (m) cluster.zoomToShowLayer(m, () => m.openPopup());
      root.querySelectorAll(".stop-item").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
    });
  });
  // Update dot colors
  root.querySelectorAll(".stop-body").forEach(b => {
    b.style.setProperty("--dotc", day.color);
  });
  // Style dots via inline (since we can't do pseudo with var dynamically across all browsers)
  const style = document.createElement("style");
  style.textContent = `.stop-body::before { background: ${day.color} !important; }`;
  document.head.querySelectorAll("style[data-dyn]").forEach(s => s.remove());
  style.dataset.dyn = "1";
  document.head.appendChild(style);
}

init();
</script>
</body>
</html>
